<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile – Student Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --maroon: #6b1a1a;
      --maroon-dark: #4a1010;
      --cream: #f5f0e8;
      --cream-dark: #ede7d9;
      --cream-mid: #e8e0ce;
      --text-dark: #2a1a1a;
      --text-muted: #7a5a5a;
      --white: #ffffff;
      --shadow: 0 4px 24px rgba(107,26,26,0.10);
      --shadow-hover: 0 8px 32px rgba(107,26,26,0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; }

    nav {
      background: var(--maroon);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 60px; position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 0.95rem; letter-spacing: 2px; text-transform: uppercase; }
    .nav-links { display: flex; gap: 8px; }
    .nav-links a {
      color: var(--cream); text-decoration: none; font-size: 0.82rem; font-weight: 500;
      padding: 6px 16px; border: 1px solid rgba(245,240,232,0.35); border-radius: 4px;
      transition: background 0.2s, color 0.2s; letter-spacing: 0.5px;
    }
    .nav-links a:hover, .nav-links a.active { background: var(--cream); color: var(--maroon); }

    .page-wrapper { max-width: 960px; margin: 0 auto; padding: 40px 20px 60px; }
    .page-title {
      font-family: 'Playfair Display', serif; font-size: 1.9rem; color: var(--maroon-dark);
      margin-bottom: 28px; border-bottom: 2px solid var(--maroon); padding-bottom: 10px;
    }

    .stats-row { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-box {
      background: var(--white); border-radius: 12px; box-shadow: var(--shadow);
      padding: 18px 28px; flex: 1; min-width: 130px; text-align: center;
    }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--maroon); }
    .stat-label { font-size: 0.73rem; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 3px; }

    .profile-card {
      background: var(--white); border-radius: 16px; box-shadow: var(--shadow);
      padding: 36px; display: flex; gap: 40px; align-items: flex-start;
      margin-bottom: 28px; flex-wrap: wrap;
    }
    .avatar-section { display: flex; flex-direction: column; align-items: center; gap: 14px; flex-shrink: 0; }
    .avatar-wrapper { position: relative; width: 120px; height: 120px; }
    .avatar-placeholder {
      width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--maroon);
      background: var(--cream-mid); display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem; color: var(--maroon);
    }
    #avatarImg {
      width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
      border: 4px solid var(--maroon); display: none; position: absolute; top: 0; left: 0;
    }
    .avatar-upload-btn {
      background: var(--maroon); color: var(--cream); border: none;
      padding: 7px 18px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; letter-spacing: 0.5px; transition: background 0.2s;
    }
    .avatar-upload-btn:hover { background: var(--maroon-dark); }
    #photoInput { display: none; }

    .info-section { flex: 1; min-width: 220px; }
    .student-name { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--maroon-dark); margin-bottom: 4px; }
    .student-tag { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 20px; letter-spacing: 0.5px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .info-item label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); display: block; margin-bottom: 3px; }
    .info-item .value { font-size: 0.92rem; font-weight: 500; color: var(--text-dark); background: var(--cream); padding: 6px 12px; border-radius: 6px; border-left: 3px solid var(--maroon); }

    .edit-card, .notes-card {
      background: var(--white); border-radius: 16px; box-shadow: var(--shadow);
      padding: 32px 36px; margin-bottom: 28px;
    }
    .section-heading { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--maroon); margin-bottom: 20px; }
    .edit-form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
    .form-group input, .form-group select {
      padding: 9px 14px; border: 1.5px solid var(--cream-mid); border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 0.9rem; color: var(--text-dark);
      background: var(--cream); transition: border-color 0.2s; outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--maroon); background: var(--white); }
    .btn-row { display: flex; align-items: center; gap: 16px; margin-top: 4px; }
    .save-btn {
      background: var(--maroon); color: var(--cream); border: none;
      padding: 10px 28px; border-radius: 8px; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; letter-spacing: 0.5px; transition: background 0.2s, box-shadow 0.2s;
    }
    .save-btn:hover { background: var(--maroon-dark); box-shadow: 0 4px 12px rgba(107,26,26,0.25); }
    .save-msg { display: none; font-size: 0.82rem; color: #2e7d32; font-weight: 600; }

    .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px; }
    .note-item {
      background: var(--cream); border-radius: 10px; padding: 16px;
      border-left: 4px solid var(--maroon); display: flex; flex-direction: column; gap: 6px;
      transition: box-shadow 0.2s, transform 0.2s; cursor: pointer;
    }
    .note-item:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .note-subject { font-weight: 600; font-size: 0.9rem; color: var(--maroon-dark); }
    .note-meta { font-size: 0.75rem; color: var(--text-muted); }
    .note-badge {
      display: inline-block; font-size: 0.68rem; font-weight: 600;
      padding: 2px 8px; border-radius: 10px; background: var(--maroon);
      color: var(--cream); letter-spacing: 0.5px; width: fit-content;
    }

    @media (max-width: 600px) {
      .profile-card { flex-direction: column; align-items: center; padding: 24px; }
      .info-grid, .edit-form { grid-template-columns: 1fr; }
      nav { padding: 0 16px; }
      .nav-brand { font-size: 0.7rem; }
      .nav-links a { padding: 5px 10px; font-size: 0.72rem; }
    }
    
    
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">Learn Smart Build Your Future</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="subjects.html">Subjects</a>
    <a href="upload.html">Upload</a>
    <a href="profile.html" class="active">Profile</a>
    <a href="sign.html">Sign In</a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="page-title">👤 My Profile</div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num">5</div>
      <div class="stat-label">Notes Downloaded</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">3</div>
      <div class="stat-label">Subjects Visited</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">2</div>
      <div class="stat-label">Uploads Shared</div>
    </div>
  </div>

  <div class="profile-card">
    <div class="avatar-section">
      <div class="avatar-wrapper">
        <div class="avatar-placeholder" id="avatarPlaceholder">🎓</div>
        <img id="avatarImg" alt="Profile Photo"/>
      </div>
      <button class="avatar-upload-btn" onclick="document.getElementById('photoInput').click()">📷 Change Photo</button>
      <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)"/>
    </div>

    <div class="info-section">
      <div class="student-name" id="displayName">Aarthi S</div>
      <div class="student-tag" id="displayTag">CSE &bull; III Year &bull; 2022–2026</div>
      <div class="info-grid">
        <div class="info-item">
          <label>Roll Number</label>
          <div class="value" id="displayRoll">CB22CS001</div>
        </div>
        <div class="info-item">
          <label>Department</label>
          <div class="value" id="displayDept">Computer Science</div>
        </div>
        <div class="info-item">
          <label>Year</label>
          <div class="value" id="displayYear">III Year</div>
        </div>
        <div class="info-item">
          <label>Email</label>
          <div class="value" id="displayEmail">aarthi@college.edu</div>
        </div>
      </div>
    </div>
  </div>

  <div class="edit-card">
    <div class="section-heading">✏️ Edit Profile</div>
    <div class="edit-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="inputName" value="Aarthi S" placeholder="Your full name"/>
      </div>
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" id="inputRoll" value="CB22CS001" placeholder="e.g. CB22CS001"/>
      </div>
      <div class="form-group">
        <label>Department</label>
        <select id="inputDept">
          <option value="Computer Science" selected>CSE – Computer Science</option>
          <option value="Electronics &amp; Comm.">ECE – Electronics &amp; Comm.</option>
          <option value="Electrical Engg.">EEE – Electrical Engg.</option>
          <option value="Mechanical">MECH – Mechanical</option>
          <option value="Civil">CIVIL – Civil</option>
          <option value="Information Technology">IT – Information Technology</option>
        </select>
      </div>
      <div class="form-group">
        <label>Year of Study</label>
        <select id="inputYear">
          <option>I Year</option>
          <option>II Year</option>
          <option selected>III Year</option>
          <option>IV Year</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Email Address</label>
        <input type="email" id="inputEmail" value="aarthi@college.edu" placeholder="your@email.com"/>
      </div>
      <div class="form-group full">
        <div class="btn-row">
          <button class="save-btn" onclick="saveProfile()">💾 Save Changes</button>
          <span class="save-msg" id="saveMsg">✅ Profile updated successfully!</span>
        </div>
      </div>
    </div>
  </div>

  

<script>
  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = document.getElementById('avatarImg');
      img.src = ev.target.result;
      img.style.display = 'block';
      document.getElementById('avatarPlaceholder').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function saveProfile() {
    const name  = document.getElementById('inputName').value.trim();
    const roll  = document.getElementById('inputRoll').value.trim();
    const dept  = document.getElementById('inputDept').value;
    const year  = document.getElementById('inputYear').value;
    const email = document.getElementById('inputEmail').value.trim();
    if (!name || !roll || !email) { alert('Please fill in all required fields.'); return; }
    document.getElementById('displayName').textContent  = name;
    document.getElementById('displayRoll').textContent  = roll;
    document.getElementById('displayDept').textContent  = dept;
    document.getElementById('displayYear').textContent  = year;
    document.getElementById('displayEmail').textContent = email;
    document.getElementById('displayTag').innerHTML     = dept + ' &bull; ' + year + ' &bull; 2022\u20132026';
    const msg = document.getElementById('saveMsg');
    msg.style.display = 'inline';
    setTimeout(() => msg.style.display = 'none', 3000);
  }
</script>
</body>
</html>
